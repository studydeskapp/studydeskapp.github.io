<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B1F3B"/>
      <stop offset="100%" style="stop-color:#2d3561"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f7c059"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Book body -->
  <rect x="24" y="30" width="24" height="38" rx="3" fill="#fff" opacity="0.15"/>
  <rect x="26" y="30" width="22" height="38" rx="2" fill="#fff" opacity="0.9"/>

  <!-- Book spine -->
  <rect x="24" y="30" width="4" height="38" rx="2" fill="#ddd"/>

  <!-- Book lines -->
  <line x1="32" y1="40" x2="44" y2="40" stroke="#1B1F3B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="32" y1="45" x2="44" y2="45" stroke="#1B1F3B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="32" y1="50" x2="40" y2="50" stroke="#1B1F3B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Checkmark circle (accent) -->
  <circle cx="63" cy="57" r="16" fill="url(#accent)"/>
  <polyline points="55,57 61,63 72,50" fill="none" stroke="#1B1F3B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
