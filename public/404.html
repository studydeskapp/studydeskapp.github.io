<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StudyDesk</title>
  <script>
    // GitHub Pages serves this for any unmatched route.
    // If someone visits /admin, redirect to /#/admin so the React app can handle it.
    var path = window.location.pathname;
    if (path === '/admin' || path.endsWith('/admin')) {
      window.location.replace('/#/admin');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
